<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict | SkyMetrics AI</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav>
        <a href="../index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            SkyMetrics AI
        </a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="predict.html" class="active">Predict</a>
            <a href="analytics.html">Analytics</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <main>
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h2 class="mb-4">Forecasting Control</h2>
            <p class="mb-4" style="color: var(--text-muted); font-size: 0.9375rem;">Configure the target parameters below to generate a passenger demand forecast.</p>
            
            <form id="prediction-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="year">Fiscal Year</label>
                        <input type="number" id="year" value="1961" min="1949" max="2030">
                    </div>
                    <div class="input-group">
                        <label for="month">Target Month</label>
                        <select id="month">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4" selected>April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="price">Ticket Price Index ($)</label>
                        <input type="number" id="price" value="6000" step="100">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn-primary" id="predict-btn" style="min-width: 180px;">
                        <span>Generate Prediction</span>
                        <div class="spinner" id="loader"></div>
                    </button>
                    <button type="reset" class="btn-secondary">Clear All</button>
                </div>
            </form>

            <div id="result-section" class="result-container">
                <div class="result-display">
                    <p class="mb-2" style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;">Estimated Passenger Count</p>
                    <div id="prediction-val" class="val">0</div>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Projected demand for the selected period.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p>&copy; 2026 SkyMetrics AI. Intelligence Above the Clouds.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script src="../js/predict.js"></script>
</body>
</html>
