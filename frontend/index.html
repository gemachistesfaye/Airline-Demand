<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Demand Forecaster</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Airline Demand Forecaster</h1>
            <p class="subtitle">Linear Regression Powered Predictions</p>
        </header>

        <section class="card">
            <form id="prediction-form" class="grid-form">
                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" value="1961" min="1949" max="2030">
                </div>
                <div class="form-group">
                    <label for="month">Month</label>
                    <select id="month">
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="price">Estimated Price ($)</label>
                    <input type="number" id="price" value="6000" step="100">
                </div>
                <div style="grid-column: span 3;">
                    <button type="submit" class="btn">Predict Passengers</button>
                </div>
            </form>

            <div id="result" class="result-section">
                <p class="subtitle">Predicted Passenger Count</p>
                <div id="prediction-val" class="result-value">0</div>
            </div>
        </section>

        <section class="card">
            <div class="metrics-row">
                <div class="metric">
                    <div class="metric-label">R² Score</div>
                    <div id="r2-val" class="metric-value">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">MAE</div>
                    <div id="mae-val" class="metric-value">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">RMSE</div>
                    <div id="rmse-val" class="metric-value">--</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="historicalChart"></canvas>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
