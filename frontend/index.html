<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Airline Demand Prediction System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Airline Demand Prediction System</h1>
            <p>Predicting future passenger traffic using Linear Regression</p>
        </header>

        <div class="dashboard-grid">
            <!-- Prediction Form Card -->
            <div class="card prediction-card">
                <h2>Predict Demand</h2>
                <form id="prediction-form">
                    <div class="form-group">
                        <label for="month">Select Month</label>
                        <select id="month" name="month">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year">Select Year</label>
                        <input type="number" id="year" name="year" value="1961" min="1949" max="1970" required>
                    </div>
                    <button type="submit" id="predict-btn">Predict Demand</button>
                </form>

                <div id="result-container" class="result-box hidden">
                    <h3>Predicted Passengers:</h3>
                    <p id="prediction-value" class="highlight">--</p>
                    <p id="accuracy-display">Model Accuracy (R²): <span id="r2-score">--</span></p>
                </div>
            </div>

            <!-- Chart Card -->
            <div class="card chart-card">
                <h2>Passenger Traffic Trends</h2>
                <div class="chart-container">
                    <canvas id="demandChart"></canvas>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Airline Demand Prediction System - University Project</p>
        </footer>
    </div>

    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
